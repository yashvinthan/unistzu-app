<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Study medicine at Unistzu. Affordable MD program in English for Indian students. WHO & NMC recognized." />
  <meta name="keywords"
    content="MBBS in Georgia, study medicine abroad, Unistzu, medical university Georgia, Indian students" />

  <!-- Open Graph -->
  <meta property="og:title" content="Study MBBS in Georgia | Unistzu" />
  <meta property="og:description"
    content="Affordable medical education in English for Indian students. WHO & NMC recognized." />
  <meta property="og:type" content="website" />

  <!-- Structured Data -->
  <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "EducationalOrganization",
        "name": "Unistzu",
        "url": "https://unistzu.com",
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "+995-568-15-43-54",
          "contactType": "Admissions"
        }
      }
    </script>
  <title>Study Medicine in Georgia | Unistzu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap"
    rel="stylesheet">
</head>

<body>
  <a href="#main"
    class="sr-only focus:not-sr-only focus:fixed focus:top-4 focus:left-4 focus:z-[100] focus:bg-white focus:px-4 focus:py-2 focus:shadow-lg focus:rounded-lg focus:text-primary-500 focus:font-bold">
    Skip to main content
  </a>
  <div id="root">
    <style>
      .initial-loader {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #111827;
        /* gray-900 */
      }

      .logo-container {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 2rem;
      }

      .pulse-ring-outer {
        position: absolute;
        width: 8rem;
        height: 8rem;
        border-radius: 50%;
        border: 1px solid rgba(14, 165, 233, 0.3);
        /* primary-500 */
        animation: pulse-op 2s infinite ease-in-out;
      }

      .pulse-ring-inner {
        position: absolute;
        width: 6rem;
        height: 6rem;
        border-radius: 50%;
        border: 1px solid rgba(14, 165, 233, 0.5);
        animation: pulse-op 2s infinite ease-in-out 0.2s;
      }

      @keyframes pulse-op {

        0%,
        100% {
          transform: scale(1);
          opacity: 0.3;
        }

        50% {
          transform: scale(1.1);
          opacity: 0.8;
        }
      }

      .logo-icon {
        position: relative;
        z-index: 10;
        width: 4rem;
        height: 4rem;
        background: linear-gradient(to bottom right, #38bdf8, #0284c7);
        border-radius: 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.3);
      }

      .logo-text {
        color: white;
        font-size: 1.875rem;
        font-weight: bold;
        font-family: 'Inter', sans-serif;
        letter-spacing: -0.05em;
      }
    </style>
    <div class="initial-loader">
      <div class="logo-container">
        <div class="pulse-ring-outer"></div>
        <div class="pulse-ring-inner"></div>
        <div class="logo-icon">
          <span class="logo-text">U</span>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
